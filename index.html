<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Itinerary Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✈️ Travel Itinerary Generator</h1>
            <p>Create your personalized travel plan in minutes</p>
        </div>

        <form id="itineraryForm" class="itinerary-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="startingLocation">Starting Location *</label>
                    <input type="text" id="startingLocation" name="startingLocation" required 
                           placeholder="e.g., New York, USA">
                </div>

                <div class="form-group">
                    <label for="destination">Destination / Location *</label>
                    <input type="text" id="destination" name="destination" required 
                           placeholder="e.g., Paris, France">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="days">Number of Days *</label>
                    <input type="number" id="days" name="days" min="1" max="365" required 
                           placeholder="e.g., 7">
                </div>

                <div class="form-group">
                    <label for="budget">Budget (USD) *</label>
                    <input type="number" id="budget" name="budget" min="0" step="0.01" required 
                           placeholder="e.g., 5000">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="travelMode">Mode of Travel *</label>
                    <select id="travelMode" name="travelMode" required>
                        <option value="">Select mode of travel</option>
                        <option value="flight">Flight</option>
                        <option value="train">Train</option>
                        <option value="bus">Bus</option>
                        <option value="car">Car</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="travelers">Number of Travelers *</label>
                    <input type="number" id="travelers" name="travelers" min="1" max="50" required 
                           placeholder="e.g., 2">
                </div>
            </div>

            <div class="form-group">
                <label for="language">Language Preferences *</label>
                <select id="language" name="language" required>
                    <option value="">Select preferred language</option>
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Italian">Italian</option>
                    <option value="Portuguese">Portuguese</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Korean">Korean</option>
                    <option value="Arabic">Arabic</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" required 
                       placeholder="your.email@example.com">
            </div>

            <div class="form-group">
                <label for="preferences">Additional Preferences (Optional)</label>
                <textarea id="preferences" name="preferences" rows="4" 
                          placeholder="e.g., Prefer vegetarian restaurants, interested in museums and art galleries, prefer morning activities..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="btn-text">Generate Itinerary</span>
                <span class="btn-loader" style="display: none;">⏳ Generating...</span>
            </button>
        </form>

        <div id="message" class="message" style="display: none;"></div>
        
        <!-- Email Status Indicators -->
        <div id="emailStatus" class="email-status" style="display: none;">
            <div class="status-icon"></div>
            <div class="status-text"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
